<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login card</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="purple">Login Form</div>
        <input class="feild" type="email" placeholder="email address ">
        <input class="feild" type="password" placeholder="password">
        <div class="checkbox">
            <div class="fitem"> <input type="checkbox">Remember me</div>
            <div class="sitem"> <a href="">Forget password?</a></div>
           
        </div>

        <div class="btn"><button class="button">Login</button></div>
        <div class="signup">
            <p>Not a member?</p>
            <a id="sign" href="">Signup now</a>
        </div>
    </div>
</body>

</html>
