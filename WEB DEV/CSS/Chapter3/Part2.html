<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display property</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            margin: 25px;
            padding: 25px;
            display: inline-block;
        }
        #box2{
            display: none;
            /* visibility: hidden; */
        }
    </style>
</head>
<body>
    <div style="background-color: yellowgreen;">Box1</div>
    <div id="box2" style="background-color: rgb(0, 224, 224);">Box2</div>
    <div style="background-color: rgb(180, 40, 255);">Box3</div>
</body>
</html>
