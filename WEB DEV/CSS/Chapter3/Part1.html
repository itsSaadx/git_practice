<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties</title>
    <style>
        #firstdiv {
            background: #ff2222;
            display: inline;
        }

        button {
            background: #9cdfc7;
            display: block;
        }
    </style>
</head>

<body>
    <div id="firstdiv">
        orem ipsum dolor, sit amet consectetur adipisicing elit. Eligendi illum ne
    </div>
    <button>
        submite
    </button>
</body>

</html>
