<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        div {
            background: #4db978;
            height: 100px;
            width: 100px;
            position: absolute;
            top: 100px;
            left: 300px;
            animation: colorAnimate 3s ease-in 1s 5;
            animation-direction: normal;
        }

        @keyframes colorAnimate {
            0% {
                background: rgb(255, 97, 24);
                left: 200px;
            }

            50% {
                background-color: rgb(255, 243, 24);
                left: 365px;
            }

            100% {
                background: #000;
                left: 500px;
            }

        }
    </style>
</head>

<body>
    <div>
        JUST FEEL IT
    </div>
</body>

</html>
