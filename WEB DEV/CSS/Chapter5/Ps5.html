<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar </title>
    <style>
        a{
            text-decoration: none;
            
        }

        li{
               display: inline;
               list-style-type: none;
        }

        ul{
            background: #bba5e6;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            height: 100px;

        }

        #parent{
        background-color: rgb(207, 160, 160);
        height: 300px;
        width:500px;
       display: flex;
       flex-direction: row;
       justify-content: center;
       align-items: center;   
       text-align: center;
    
        }

        #child{
        background-color: palevioletred;
        height: 200px;
        width: 250px;
        }
        
        h1{
            text-align: center;
        }

        #parent{
            margin-left: 506px;
        }
    </style>
</head>
<body>
    <div>
    <ul>
        <li><a href="">Home</a></li>
        <li><a href="">Contact</a></li>
        <li><a href="">Query</a></li>
        <li><a href="">About us</a></li>
    </ul>
    </div>
<br>
<br>
<br>
    <h1>Div inside Anothor Div </h1>
    <div id="parent">
        <div id="child">
         BOX 2
        </div>
    </div>
</body>
</html>
