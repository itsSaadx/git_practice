<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position static,relative,absolut,fixed</title>
    <style>
        div {
            background-color: rgb(58, 255, 255);
            border: 2px solid rgb(0, 0, 0);
            display: inline-block;
            height: 100px;
            width: 100px;
        }

        #box1 {
            position: static;
            top: 45px;
            bottom: 14px;

        }

        #box2 {
            position: relative;
            left: 13px;
            right: 45px;
            top: 12px;

        }

        #box3 {
            position: absolute;
            top: 10px;
            left: 20px;
            z-index: -1;
        }

        #box4 {
            position: fixed;
            right: 34px;
            top: 0px;
        }
    </style>
</head>

<body>
    <h1>Position playground</h1>
    <div id="box1" style="background-color: blue;">box1</div>
    <div id="box2" style="background-color: rgb(114, 114, 135);">box2</div>
    <div id="box3" style="background-color: rgb(40, 157, 122);">box3</div>
    <div id="box4">box4</div>

</body>

</html>
