<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative size %,em,rem</title>
    <style>
        #box1 {
            background-color: cadetblue;
            height: 100px;
            width: 100px;
            font-size: 10px;
        }

        #box2 {
            background-color: aquamarine;
            width: 30%;
            margin-left: 20%;
            /* 2em 2 times of parent   */
            font-size: 2em;
            /* 2 times of root element */
            width: 3rem;
            height: 50vh;
            /* width: 50vw; */
        }
    </style>
</head>

<body>
    hello
    <div id="box1">
        box1
        <div id="box2">
            box2
        </div>
    </div>
</body>

</html>
