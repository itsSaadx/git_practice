<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin & padding </title>
    <style>
    div{
        background-color: rgb(255, 77, 163);
        width: 100px;
        height: 100px;
        padding: 12px;
        border: 4px solid darkblue;
        border-radius: 12px;
        margin: 24px 12px ;
    }
    </style>
</head>
<body>
    <div id="one"><p>div1</p></div>
    <div id="two"><p>div2</p></div>
    <div id="three"><p>div3</p></div>
</body>
</html>
