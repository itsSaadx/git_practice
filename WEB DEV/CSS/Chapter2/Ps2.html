<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar</title>
    <style>
        nav {
            background-color: rgb(0, 0, 0);
            border: 5px solid rgb(248, 255, 31);
        }

        div {
            height: 33px;
            margin: 18px;
            padding: 18px;

        }


        * {
            color: yellow;
            text-decoration: none;
        }

        a {
            margin-right: 200px;
        }

        button {
            color: rgb(0, 0, 0);
            background: rgb(248, 255, 31);
        }

        input {
            width: 186px;
            border-radius: 10px;
            color: rgb(0, 0, 0);
        }
    </style>
</head>

<body>
    <nav>
        <div>
            <a href="">Amazon.in</a>

            <a href="">Account</a>

            <a href="">My cart</a>

            <a href="">Contact us</a>


            <input type="text" placeholder="Search Amazon Products">
            <button>Search</button>

        </div>
    </nav>
</body>

</html>
