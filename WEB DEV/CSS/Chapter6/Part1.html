<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media queries</title>
    <style>
        div{
            background: #8293f3;
            height: 100px;
            width: 150px;
        }

       @media(width:600px){
        #box1{
            color: tomato;
            background-color: aqua;
        }
        }

         @media(min-width:600px){
        #box2{
            color: rgb(26, 251, 255);
            background-color: rgb(198, 27, 255);
        }
        }

        
         @media(max-height:400px){
        #box3{
            color: rgb(255, 238, 0);
            background-color: rgb(60, 242, 221);
        }
        }

           @media(min-width:300px) and (max-width:500px){
        #box3{
            color: rgb(255, 238, 0);
            background-color: rgb(60, 242, 221);
        }
        }


    </style>
</head>
<body>
    <div id="box1">
        box1
    </div>
<br><br>
    <div id="box2">
        box2
    </div>
    <br><br>
    <div id="box3">box3</div>
</body>
</html>
