<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="c.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="card">
    <div class="top"></div>

    <div class="profile">
      <img src="Profileimg.jpeg" alt="">
    </div>

    <h2>CodingLab</h2>
    <p class="job">YouTuber & Blogger</p>

    <div class="socials">
      <span class="fb"><i class="fab fa-facebook-f"></i></span>
      <span class="tw"><i class="fab fa-twitter"></i></span>
      <span class="ig"><i class="fab fa-instagram"></i></span>
      <span class="yt"><i class="fab fa-youtube"></i></span>
    </div>

    <div class="buttons">
      <button>Subscribe</button>
      <button>Message</button>
    </div>

    <div class="stats" >
      <div ><i class="far fa-heart" ></i> 60k</div>
      <div><i class="far fa-comment"></i> 20k</div>
      <div><i class="fa fa-share"></i> 12k</div>
    </div>
  </div>

</body>

</html>
