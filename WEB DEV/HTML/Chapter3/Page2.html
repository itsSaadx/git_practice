<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in html</title>
    <style>
   body {
      font-family: Arial, sans-serif;
      background: #f4f7fc;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
   }

   form {
      background: #fff;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 400px;
   }

   h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
      font-size: 24px;
   }

   div {
      margin-bottom: 15px;
   }

   label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #444;
   }

   input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
   }

   input:focus, select:focus, textarea:focus {
      border-color: #4a90e2;
   }

   textarea {
      resize: none;
   }

   p {
      margin: 0 0 8px 0;
      font-weight: bold;
      color: #444;
   }

   /* Radio & Checkbox styling */
   input[type="radio"], input[type="checkbox"] {
      width: auto;
      margin-right: 5px;
   }

   button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition:  0.3s;
   }

   button:hover {
      background: #357ab8;
   }
</style>

</head>
<body>
  
   <form action="/submit.php">
   <div>
    <label for="name">Name</label>
    <input id="name" type="name" placeholder="enter name" required>
   </div>

    <div>
    <label for="ph">Phone</label>
    <input id ="ph" type="tel" placeholder="enter Phone number" required>
   </div>

  <div>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="enter email" required>
   </div>

     <div>
    <label for="Password">Password</label>
    <input id="password" type="password" placeholder="Enter Password" required>
   </div>

     <div>
    <label for="dob">Date of birth</label>
    <input id="dob" type="date" placeholder="Date of birth" required>  
   </div>

   <div>
      <label for="Gender">Gender</label>
    <Select id="Gender" required>
      <option id="" disabled selected>select</option>
      <option value="male">male</option>
      <option value="female">female</option>
      <option value="other">other</option>
    </Select>
   </div>

   <!-- radio button for subscription -->
   <div>
    <p>subscription plan</p>
    <input id="basic" type="radio" name="subscription" value="basic" >
    <label for="basic">Basic</label>

    <input id="standard" type="radio" name="subscription" value="standard" >
    <label for="standard">Standard</label>

    <input id="ultimate" type="radio" name="subscription" value="ultimate" >
    <label for="ultimate">Ultimate</label>
   </div>

   <!-- check box -->
   <div>
    <input id="terms" type="checkbox" required>
    <label for="terms">please check box</label>
   </div>

   <div>
    <p>enter you thoughts</p>
   <label for="feedback"></label>
   <textarea id="feedback" placeholder="enter your feed back" rows="5"></textarea>
   </div>

   <div>
    <button type="submit">submit</button>
   </div>
</form>
</body>
</html>
